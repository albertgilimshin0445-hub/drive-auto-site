name: Compact estimate form

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/compact-estimate-form.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redesign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make estimate form compact
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '/* compact-estimate-form-v1 */'

          if marker not in text:
              css = r'''/* compact-estimate-form-v1 */
          .sell{grid-template-columns:minmax(0,1.35fr) minmax(390px,.65fr);align-items:center;min-height:640px;padding:0 44px 0 0;background:#0b0b0b}
          .sell-copy{min-height:640px;padding:58px}
          .sell-form{width:min(438px,calc(100% - 32px));justify-self:center;align-self:center;margin:32px auto;padding:34px 32px;background:#f4f0e9;border:1px solid #d8cdbb;box-shadow:0 24px 70px #0006;overflow:hidden}
          .sell-form:before,.sell-form:after{display:none}
          .sell-form h2{font-size:30px;line-height:1.08;margin:0 0 8px}
          .form-kicker{margin-bottom:9px;font-size:9px}
          .form-intro{font-size:12px;line-height:1.5;margin:0 0 21px}
          .form-grid{gap:12px}
          .form-field span{font-size:9px;margin-bottom:6px}
          .form-field input{height:47px;padding:0 13px}
          .form-benefits{margin:15px 0 13px;gap:6px 14px;font-size:9px}
          .sell-form .gold-btn{min-height:51px;margin-top:0;font-size:13px;box-shadow:none}
          .sell-form .note{font-size:9px;line-height:1.45;margin-top:10px}
          @media(max-width:1100px){.sell{grid-template-columns:1fr 460px;padding-right:20px}.sell-copy{padding:42px}.sell-form{width:min(420px,calc(100% - 24px));padding:30px 27px}}
          @media(max-width:800px){.sell{grid-template-columns:1fr;padding:0;min-height:auto}.sell-copy{min-height:480px;padding:34px 22px}.sell-form{width:calc(100% - 28px);margin:18px auto 34px;padding:30px 24px}.form-grid{grid-template-columns:1fr 1fr}.form-field.full{grid-column:1/-1}}
          @media(max-width:520px){.sell-form{padding:27px 19px}.form-grid{grid-template-columns:1fr}.form-field.full{grid-column:auto}.form-benefits{display:none}}
          '''
              text = text.replace('</style>', css + '</style>', 1)

          text = text.replace('<h2>Расскажите об автомобиле</h2>', '<h2>Получить оценку</h2>', 1)
          text = text.replace('Заполните короткую форму — мы оценим автомобиль по рынку и свяжемся с вами для уточнения деталей.', 'Оставьте данные автомобиля — мы рассчитаем рыночную стоимость и свяжемся с вами.', 1)
          text = text.replace('Получить оценку автомобиля →', 'Получить оценку →', 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit redesign
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Make estimate form compact"
          git push
