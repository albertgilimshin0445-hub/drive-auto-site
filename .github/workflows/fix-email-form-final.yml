name: Fix email form final

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-email-form-final.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-form:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply reliable native FormSubmit configuration
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          # Strict native HTML POST. No AJAX and no JS interception.
          text = re.sub(
              r'<form class="sell-form"[^>]*>',
              '<form class="sell-form" action="https://formsubmit.co/primer4424@mail.ru" method="POST" accept-charset="UTF-8" referrerpolicy="origin" target="_self" id="sellForm">',
              text,
              count=1,
          )

          # FormSubmit recommends leaving reCAPTCHA enabled because disabling it
          # can trigger technical limitations.
          text = re.sub(r'<input type="hidden" name="_captcha" value="false">', '', text, count=1)

          # Autoresponse requires a visitor email field; this form collects phone only.
          text = re.sub(r'<input type="hidden" name="_autoresponse"[^>]*>', '', text, count=1)

          next_input = '<input type="hidden" name="_next" value="https://albertgilimshin0445-hub.github.io/drive-auto-site/thanks.html">'
          text = re.sub(r'<input type="hidden" name="_next"[^>]*>', next_input, text, count=1)

          # Explicit source URL fixes strict cross-origin referrer handling.
          text = re.sub(r'<input type="hidden" name="_url"[^>]*>', '', text)
          url_input = '<input type="hidden" name="_url" value="https://albertgilimshin0445-hub.github.io/drive-auto-site/#sell">'
          text = text.replace(next_input, next_input + url_input, 1)

          if 'name="Источник"' not in text:
              text = text.replace(url_input, url_input + '<input type="hidden" name="Источник" value="DRIVE — форма оценки автомобиля">', 1)

          # Remove all old JavaScript submit UI logic. The browser must submit natively.
          exact = ";const sellForm=document.getElementById('sellForm'),formNote=document.getElementById('formNote'),submitEstimate=document.getElementById('submitEstimate'),formUrl=document.getElementById('formUrl');if(location.protocol.startsWith('http'))formUrl.value=location.origin+location.pathname;sellForm.addEventListener('submit',()=>{if(!sellForm.reportValidity())return;submitEstimate.disabled=true;submitEstimate.textContent='Отправляем…';formNote.textContent='Перенаправляем на безопасную отправку заявки…';formNote.className='note'})"
          text = text.replace(exact, '')
          text = re.sub(
              r";const sellForm=document\.getElementById\('sellForm'\).*?sellForm\.addEventListener\('submit',\(\)=>\{.*?\}\)",
              '',
              text,
              count=1,
          )

          text = text.replace(
              'Заявка отправится на Primer4424@mail.ru. При первой заявке подтвердите адрес в письме от FormSubmit.',
              'После отправки пройдите проверку FormSubmit. При первой заявке подтвердите адрес в письме на Primer4424@mail.ru.'
          )

          path.write_text(text, encoding='utf-8')

          # Fail the workflow if the final configuration is not exact.
          assert 'action="https://formsubmit.co/primer4424@mail.ru"' in text
          assert 'method="POST"' in text
          assert 'name="_next" value="https://albertgilimshin0445-hub.github.io/drive-auto-site/thanks.html"' in text
          assert 'name="_url" value="https://albertgilimshin0445-hub.github.io/drive-auto-site/#sell"' in text
          assert 'name="_captcha" value="false"' not in text
          assert 'fetch(' not in text
          assert 'submitEstimate.disabled' not in text
          assert "sellForm.addEventListener('submit'" not in text
          PY
      - name: Commit form fix
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix email delivery with native FormSubmit POST"
          git push
