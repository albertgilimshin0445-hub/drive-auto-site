name: Add German cars catalog

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/add-german-cars.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add new German vehicles
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '<!-- german-cars-2026-v1 -->'

          if marker in text:
              print('Cars already added')
              raise SystemExit(0)

          # Add Audi to the brand selector and extend the upper price ranges.
          text = text.replace(
              '<option>Mercedes-Benz</option><option>Porsche</option>',
              '<option>Mercedes-Benz</option><option>Audi</option><option>Porsche</option>',
              1,
          )
          text = text.replace(
              '<option value="60000000">60 млн ₸</option>',
              '<option value="60000000">60 млн ₸</option><option value="70000000">70 млн ₸</option><option value="100000000">100 млн ₸</option>',
              1,
          )

          fallback = "https://drive-auto.tender-mochi-3238.chatgpt.site/hero-onyx-production.webp"
          cards = f'''{marker}
          <article class="car" data-type="Седан" data-brand="BMW" data-model="520i" data-name="BMW 520i" data-price="38451975"><div class="photo"><img loading="lazy" src="https://bmw.scene7.com/is/image/BMW/g60-ice-stage-ext-dsk-fb?fmt=webp&amp;qlt=80&amp;wid=1024" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый BMW 520i"><span class="tag">Новый автомобиль</span></div><small>Новый · Седан</small><h3>BMW 520i</h3><div class="spec">0 км · 2.0 л · бензин · автомат</div><div class="price"><strong>от 38 451 975 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>
          <article class="car" data-type="Кроссовер" data-brand="BMW" data-model="X3 20 xDrive" data-name="BMW X3 20 xDrive" data-price="40684936"><div class="photo"><img loading="lazy" src="https://bmw.scene7.com/is/image/BMW/g45_ice_stage_dsk_fb?fmt=webp&amp;qlt=80&amp;wid=1024" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый BMW X3 20 xDrive"><span class="tag">Новый автомобиль</span></div><small>Новый · Кроссовер</small><h3>BMW X3 20 xDrive</h3><div class="spec">0 км · 2.0 л · бензин · полный привод</div><div class="price"><strong>от 40 684 936 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>
          <article class="car" data-type="Седан" data-brand="Mercedes-Benz" data-model="C-Class Sedan" data-name="Mercedes-Benz C-Class Sedan" data-price="33445500"><div class="photo"><img loading="lazy" src="https://mercedes-benz.com.kz/upload/iblock/e7f/e7f0ee68b3617fd1bd86678805b52e6d.jpg" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый Mercedes-Benz C-Class"><span class="tag">Новый автомобиль</span></div><small>Новый · Седан</small><h3>Mercedes-Benz C-Class Sedan</h3><div class="spec">0 км · бензин · автомат · премиум-класс</div><div class="price"><strong>от 33 445 500 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>
          <article class="car" data-type="Кроссовер" data-brand="Mercedes-Benz" data-model="AMG GLE 53 4MATIC+" data-name="Mercedes-AMG GLE 53 4MATIC+" data-price="67047000"><div class="photo"><img loading="lazy" src="https://mercedes-benz-bluestar.kz/upload/iblock/977/977bf73ac5ac700f3b03b550dfbd81ec.jpg" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый Mercedes-AMG GLE 53"><span class="tag">Новый автомобиль</span></div><small>Новый · Кроссовер</small><h3>Mercedes-AMG GLE 53 4MATIC+</h3><div class="spec">0 км · 3.0 л · бензин · полный привод</div><div class="price"><strong>от 67 047 000 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>
          <article class="car" data-type="Седан" data-brand="Audi" data-model="New A6" data-name="Audi New A6" data-price="41370000"><div class="photo"><img loading="lazy" src="https://audi.kz/userdata/section/section_389/image_1736/1770885966_42797771_m.webp" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый Audi A6"><span class="tag">Новый автомобиль</span></div><small>Новый · Седан</small><h3>Audi New A6</h3><div class="spec">0 км · 2.0 л · бензин · quattro</div><div class="price"><strong>от 41 370 000 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>
          <article class="car" data-type="Кроссовер" data-brand="Audi" data-model="Q8 55 TFSI quattro" data-name="Audi Q8 55 TFSI quattro" data-price="65060000"><div class="photo"><img loading="lazy" src="https://audi.kz/userdata/section/section_378/image_1556/1744625585_397875238_m.webp" onerror="this.onerror=null;this.src='{fallback}'" alt="Новый Audi Q8"><span class="tag">Новый автомобиль</span></div><small>Новый · Кроссовер</small><h3>Audi Q8 55 TFSI quattro</h3><div class="spec">0 км · 3.0 л · бензин · полный привод</div><div class="price"><strong>от 65 060 000 ₸</strong><button class="credit-link" type="button">Рассчитать кредит →</button></div></article>'''

          anchor = '</article></div></section><section class="steps"'
          if anchor not in text:
              raise RuntimeError('Cars section anchor was not found')
          note = '<p class="price-note">Цены указаны «от» и актуальны на 10 июля 2026 года. Итоговая стоимость зависит от комплектации и наличия у дилера.</p>'
          text = text.replace(anchor, '</article>' + cards + '</div>' + note + '</section><section class="steps"', 1)

          # Add the same vehicles to the credit calculator.
          porsche_option = '<option value="54800000" data-name="Porsche Panamera 4">Porsche Panamera — 54 800 000 ₸</option>'
          options = '''<option value="38451975" data-name="BMW 520i">BMW 520i — от 38 451 975 ₸</option><option value="40684936" data-name="BMW X3 20 xDrive">BMW X3 — от 40 684 936 ₸</option><option value="33445500" data-name="Mercedes-Benz C-Class Sedan">Mercedes C-Class — от 33 445 500 ₸</option><option value="67047000" data-name="Mercedes-AMG GLE 53 4MATIC+">Mercedes-AMG GLE 53 — от 67 047 000 ₸</option><option value="41370000" data-name="Audi New A6">Audi New A6 — от 41 370 000 ₸</option><option value="65060000" data-name="Audi Q8 55 TFSI quattro">Audi Q8 — от 65 060 000 ₸</option>'''
          if porsche_option not in text:
              raise RuntimeError('Calculator option anchor was not found')
          text = text.replace(porsche_option, porsche_option + options, 1)

          css = '.price-note{margin:24px 0 0;color:var(--muted);font-size:10px;line-height:1.55}.car .photo img{background:#151515}'
          text = text.replace('</style>', css + '</style>', 1)

          assert marker in text
          assert 'data-brand="Audi"' in text
          assert text.count('Новый автомобиль') >= 7
          assert 'Mercedes-AMG GLE 53 — от 67 047 000 ₸' in text
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit catalog update
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add six new German cars with current prices"
          git push
