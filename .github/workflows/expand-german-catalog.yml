          path.write_text(text, encoding='utf-8')

          detail_css = '''
          :root{--bg:#090909;--panel:#121212;--text:#f5f2ec;--muted:#a8a39a;--line:#ffffff20;--gold:#c3a36a;--gold2:#dfc38f;--paint:#111}
          *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;line-height:1.55}a{color:inherit;text-decoration:none}.wrap{width:min(1240px,calc(100% - 40px));margin:auto}.top{height:78px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.logo{font-size:22px;letter-spacing:.16em;font-weight:600}.back{font-size:12px;color:var(--muted)}.crumb{padding:26px 0 10px;color:#777;font-size:11px}.hero{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(330px,.55fr);gap:44px;padding:18px 0 70px}.main-photo{position:relative;min-height:520px;background:#151515;overflow:hidden;border:1px solid var(--line)}.main-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:.35s}.main-photo:after{content:'';position:absolute;inset:0;background:var(--paint);mix-blend-mode:color;opacity:.18;pointer-events:none}.thumbs{display:flex;gap:10px;margin-top:10px}.thumb{width:112px;height:74px;padding:0;border:1px solid var(--line);background:#161616;cursor:pointer;overflow:hidden}.thumb.active{border-color:var(--gold)}.thumb img{width:100%;height:100%;object-fit:cover}.summary{padding-top:10px}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--gold)}h1{font-size:clamp(42px,5vw,70px);line-height:1.02;letter-spacing:-.045em;font-weight:400;margin:14px 0 14px}.desc{color:var(--muted);font-size:14px}.price{font-family:Georgia,serif;font-size:38px;color:var(--gold2);margin:30px 0 3px}.price-note{font-size:10px;color:#777}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:26px 0}.quick div{border:1px solid var(--line);padding:13px}.quick span{display:block;color:#777;font-size:9px;text-transform:uppercase;letter-spacing:.1em}.quick b{display:block;margin-top:3px;font-size:13px}.colors-title{margin-top:27px;font-size:11px;color:var(--muted)}.swatches{display:flex;gap:10px;margin:10px 0}.swatch{width:34px;height:34px;border-radius:50%;border:2px solid #fff3;cursor:pointer;background:var(--swatch)}.swatch.active{outline:2px solid var(--gold);outline-offset:3px}.chosen-color{font-size:11px;color:#888}.cta{display:block;text-align:center;background:var(--gold);color:#111;font-weight:600;padding:16px;margin-top:26px}.cta:hover{background:var(--gold2)}.section{padding:70px 0;border-top:1px solid var(--line)}h2{font-size:36px;font-weight:400;letter-spacing:-.03em;margin:0 0 25px}.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line)}.spec-grid div{padding:22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.spec-grid div:nth-child(4n){border-right:0}.spec-grid span{display:block;color:#777;font-size:9px;text-transform:uppercase;letter-spacing:.12em}.spec-grid b{display:block;margin-top:7px;font-size:15px}.equipment{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.equipment div{padding:20px;border:1px solid var(--line);background:var(--panel);font-size:13px}.equipment div:before{content:'✓';color:var(--gold);margin-right:9px}.offer{display:grid;grid-template-columns:1fr 1fr;gap:30px}.offer-box{border:1px solid var(--line);padding:28px;background:var(--panel)}.offer-box p{color:var(--muted);font-size:13px}.source{color:var(--gold2);font-size:12px;text-decoration:underline}.disclaimer{color:#777;font-size:10px;margin-top:18px}footer{padding:45px 0;color:#777;font-size:11px;border-top:1px solid var(--line)}
