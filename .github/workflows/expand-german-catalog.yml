          catalog = '''<section class="wrap" id="cars"><div class="section-head"><div><div class="eyebrow">Новые автомобили из Германии</div><h2>Элегантность <em>в каждой детали</em></h2><p>BMW, Mercedes-Benz, Audi и Porsche. Цены сверены с официальными сайтами брендов в Казахстане на 10 июля 2026 года.</p></div></div><div class="filters"><button class="filter active" data-type="all">Все</button><button class="filter" data-type="Кроссовер">Кроссоверы</button><button class="filter" data-type="Седан">Седаны</button></div><div class="cars" id="carsList">''' + ''.join(card(c) for c in cars) + '''</div><p class="catalog-note">Цены указаны как стартовые или для конкретного автомобиля в наличии и не являются публичной офертой. Итоговая стоимость зависит от комплектации и наличия.</p></section>'''

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'<section class="wrap" id="cars">.*?</section><section class="steps"', catalog + '<section class="steps"', text, count=1, flags=re.S)
