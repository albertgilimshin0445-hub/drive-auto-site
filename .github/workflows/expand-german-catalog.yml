          def detail_page(c):
              thumbs = ''.join(f'<button class="thumb{" active" if i==0 else ""}" type="button" data-src="{src}"><img src="{src}" alt="{c["name"]}, вид {i+1}"></button>' for i,src in enumerate(c['gallery']))
