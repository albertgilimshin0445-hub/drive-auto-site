              equipment = ''.join(f'<div>{f}</div>' for f in c['features'])
              specs = [('Год',c['year']),('Кузов',c['type']),('Двигатель',c['engine']),('Мощность',c['power']),('Привод',c['drive']),('Коробка',c['gearbox']),('0–100 км/ч',c['accel']),('Макс. скорость',c['speed']),('Мест',c['seats']),('Статус',c['stock']),('Локация',c['location']),('Гарантия','Уточняется у дилера')]
              spec_html = ''.join(f'<div><span>{k}</span><b>{v}</b></div>' for k,v in specs)
              first_color = c['colors'][0][0]
              canonical = base_url + 'cars/' + c['slug'] + '.html'
              return f'''<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{c['name']} — цена и характеристики | DRIVE</title><meta name="description" content="{c['name']}: цена от {c['price_text']}, характеристики, цвета и оснащение."><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="{canonical}"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>{detail_css}</style></head><body><header class="wrap top"><a class="logo" href="../index.html">DRIVE</a><a class="back" href="../index.html#cars">← Все автомобили</a></header><main class="wrap"><div class="crumb">Главная / Автомобили / {c['brand']} / {c['short']}</div><section class="hero"><div><div class="main-photo" id="paintPreview"><img id="mainImage" src="{c['gallery'][0]}" alt="{c['name']}"></div><div class="thumbs">{thumbs}</div></div><div class="summary"><div class="eyebrow">{c['tag']} · {c['year']}</div><h1>{c['name']}</h1><p class="desc">{c['description']}</p><div class="price">от {c['price_text']}</div><div class="price-note">Цена проверена {price_date}. Итоговая стоимость зависит от комплектации.</div><div class="quick"><div><span>Двигатель</span><b>{c['engine']}</b></div><div><span>Мощность</span><b>{c['power']}</b></div><div><span>Привод</span><b>{c['drive']}</b></div><div><span>Разгон</span><b>{c['accel']}</b></div></div><div class="colors-title">Выберите цвет кузова</div><div class="swatches">{swatches}</div><div class="chosen-color">Выбран: <b id="colorName">{first_color}</b></div><a class="cta" id="offerLink" href="mailto:Primer4424@mail.ru?subject=Заявка%20на%20{html.escape(c['name'])}">Получить предложение →</a></div></section><section class="section"><div class="eyebrow">Основные данные</div><h2>Характеристики</h2><div class="spec-grid">{spec_html}</div></section><section class="section"><div class="eyebrow">Комфорт и технологии</div><h2>Основное оснащение</h2><div class="equipment">{equipment}</div></section><section class="section offer"><div class="offer-box"><div class="eyebrow">Наличие</div><h2>{c['stock']}</h2><p>Локация: {c['location']}. Для подтверждения комплектации, цвета и срока поставки оставьте заявку.</p><a class="cta" href="mailto:Primer4424@mail.ru?subject=Тест-драйв%20{html.escape(c['name'])}">Записаться на тест-драйв →</a></div><div class="offer-box"><div class="eyebrow">Цена и источник</div><h2>{c['price_text']}</h2><p>Цена взята с официального сайта бренда в Казахстане и актуальна на дату проверки.</p><a class="source" href="{c['source']}" target="_blank" rel="noopener">Открыть официальный источник ↗</a><p class="disclaimer">Информация носит справочный характер и не является публичной офертой. Характеристики могут отличаться в зависимости от конкретной комплектации.</p></div></section></main><footer class="wrap">© 2026 DRIVE · <a href="mailto:Primer4424@mail.ru">Primer4424@mail.ru</a></footer><script>(()=>{{const main=document.getElementById('mainImage'),preview=document.getElementById('paintPreview'),colorName=document.getElementById('colorName'),offer=document.getElementById('offerLink');document.querySelectorAll('.thumb').forEach(b=>b.addEventListener('click',()=>{{document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));b.classList.add('active');main.src=b.dataset.src}}));document.querySelectorAll('.swatch').forEach(b=>b.addEventListener('click',()=>{{document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));b.classList.add('active');preview.style.setProperty('--paint',b.dataset.hex);colorName.textContent=b.dataset.color;offer.href='mailto:Primer4424@mail.ru?subject='+encodeURIComponent('Заявка на {c['name']}')+'&body='+encodeURIComponent('Автомобиль: {c['name']}\\nЦвет: '+b.dataset.color+'\\nЦена: от {c['price_text']}')}}));}})();</script></body></html>'''

          out = Path('cars')
          out.mkdir(exist_ok=True)
          for c in cars:
              (out / f"{c['slug']}.html").write_text(detail_page(c), encoding='utf-8')

          sitemap = ['<?xml version="1.0" encoding="UTF-8"?>','<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',f'  <url><loc>{base_url}</loc><lastmod>2026-07-10</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>']
          sitemap += [f'  <url><loc>{base_url}cars/{c["slug"]}.html</loc><lastmod>2026-07-10</lastmod><changefreq>weekly</changefreq><priority>0.8</priority></url>' for c in cars]
          sitemap.append('</urlset>')
          Path('sitemap.xml').write_text('\n'.join(sitemap)+'\n', encoding='utf-8')

          assert len(list(out.glob('*.html'))) >= len(cars)
          assert 'New Audi A6' in text and 'BMW X3 20 xDrive' in text and 'Porsche Panamera' in text
          PY
