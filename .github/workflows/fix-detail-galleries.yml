          style = r'''
          :root{--bg:#090909;--panel:#121212;--text:#f5f2ec;--muted:#a8a39a;--line:#ffffff20;--gold:#c3a36a;--gold2:#dfc38f;--paint:#111}
          *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;line-height:1.55}a{color:inherit;text-decoration:none}.wrap{width:min(1240px,calc(100% - 40px));margin:auto}.top{height:78px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.logo{font-size:22px;letter-spacing:.16em;font-weight:600}.back{font-size:12px;color:var(--muted)}.crumb{padding:26px 0 10px;color:#777;font-size:11px}.hero{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(330px,.55fr);gap:44px;padding:18px 0 70px}.main-photo{position:relative;min-height:520px;background:#151515;overflow:hidden;border:1px solid var(--line)}.main-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:.35s}.main-photo:after{content:'';position:absolute;inset:0;background:var(--paint);mix-blend-mode:color;opacity:.15;pointer-events:none}.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.thumb{height:92px;padding:0;border:1px solid var(--line);background:#161616;cursor:pointer;overflow:hidden;position:relative}.thumb.active{border-color:var(--gold)}.thumb img{width:100%;height:100%;object-fit:cover}.thumb span{position:absolute;left:6px;bottom:5px;background:#000c;padding:3px 6px;font-size:8px}.summary{padding-top:10px}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--gold)}h1{font-size:clamp(42px,5vw,70px);line-height:1.02;letter-spacing:-.045em;font-weight:400;margin:14px 0}.desc{color:var(--muted);font-size:14px}.price{font-family:Georgia,serif;font-size:38px;color:var(--gold2);margin:30px 0 3px}.price-note{font-size:10px;color:#777}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:26px 0}.quick div{border:1px solid var(--line);padding:13px}.quick span{display:block;color:#777;font-size:9px;text-transform:uppercase;letter-spacing:.1em}.quick b{display:block;margin-top:3px;font-size:13px}.colors-title{margin-top:27px;font-size:11px;color:var(--muted)}.swatches{display:flex;gap:10px;margin:10px 0}.swatch{width:34px;height:34px;border-radius:50%;border:2px solid #fff3;cursor:pointer;background:var(--swatch)}.swatch.active{outline:2px solid var(--gold);outline-offset:3px}.chosen-color{font-size:11px;color:#888}.cta{display:block;text-align:center;background:var(--gold);color:#111;font-weight:600;padding:16px;margin-top:26px}.cta:hover{background:var(--gold2)}.section{padding:70px 0;border-top:1px solid var(--line)}h2{font-size:36px;font-weight:400;letter-spacing:-.03em;margin:0 0 25px}.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.gallery-card{border:1px solid var(--line);background:var(--panel);overflow:hidden}.gallery-card img{width:100%;height:300px;object-fit:cover;display:block}.gallery-meta{display:flex;justify-content:space-between;gap:10px;padding:11px 13px;font-size:11px}.gallery-meta a{color:var(--gold2)}.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line)}.spec-grid div{padding:22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.spec-grid div:nth-child(4n){border-right:0}.spec-grid span{display:block;color:#777;font-size:9px;text-transform:uppercase;letter-spacing:.12em}.spec-grid b{display:block;margin-top:7px;font-size:15px}.equipment{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.equipment div{padding:20px;border:1px solid var(--line);background:var(--panel);font-size:13px}.equipment div:before{content:'✓';color:var(--gold);margin-right:9px}.offer{display:grid;grid-template-columns:1fr 1fr;gap:30px}.offer-box{border:1px solid var(--line);padding:28px;background:var(--panel)}.offer-box p{color:var(--muted);font-size:13px}.disclaimer{color:#777;font-size:10px;margin-top:18px}footer{padding:45px 0;color:#777;font-size:11px;border-top:1px solid var(--line)}
          @media(max-width:900px){.hero{grid-template-columns:1fr}.main-photo{min-height:420px}.spec-grid{grid-template-columns:1fr 1fr}.spec-grid div:nth-child(4n){border-right:1px solid var(--line)}.spec-grid div:nth-child(2n){border-right:0}.equipment{grid-template-columns:1fr 1fr}}
          @media(max-width:560px){.wrap{width:calc(100% - 28px)}.main-photo{min-height:280px}.hero{gap:24px;padding-bottom:45px}.quick,.offer,.equipment,.gallery-grid{grid-template-columns:1fr}.price{font-size:31px}.spec-grid{grid-template-columns:1fr}.spec-grid div{border-right:0!important}.thumbs{grid-template-columns:repeat(2,1fr)}.thumb{height:82px}.gallery-card img{height:230px}}
          '''

          def detail_html(c):
              thumbs = ''.join(
                  f'<button class="thumb {"active" if i == 0 else ""}" type="button" data-src="{img(fn)}"><img src="{img(fn, 360)}" alt="{c["name"]}: {caption}"><span>{caption}</span></button>'
                  for i, (fn, caption) in enumerate(c['gallery'])
              )
              gallery = ''.join(
                  f'<article class="gallery-card"><img src="{img(fn)}" alt="{c["name"]}: {caption}"><div class="gallery-meta"><b>{caption}</b><a href="{file_page(fn)}" target="_blank" rel="noopener">Источник ↗</a></div></article>'
                  for fn, caption in c['gallery']
              )
              colors = ''.join(
                  f'<button class="swatch {"active" if i == 0 else ""}" type="button" style="--swatch:{hexv}" data-color="{name}" data-hex="{hexv}" aria-label="{name}"></button>'
                  for i, (name, hexv) in enumerate(c['colors'])
              )
              equip = ''.join(f'<div>{x}</div>' for x in c['equipment'])
              return f'''<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{c['name']} — цена и характеристики | DRIVE</title><meta name="description" content="{c['description']}"><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://albertgilimshin0445-hub.github.io/drive-auto-site/{c['path']}"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>{style}</style></head><body><header class="wrap top"><a class="logo" href="../index.html">DRIVE</a><a class="back" href="../index.html#cars">← Все автомобили</a></header><main class="wrap"><div class="crumb">Главная / Автомобили / {c['brand']} / {c['name']}</div><section class="hero"><div><div class="main-photo" id="paintPreview"><img id="mainImage" src="{img(c['gallery'][0][0])}" alt="{c['name']}"></div><div class="thumbs">{thumbs}</div></div><div class="summary"><div class="eyebrow">{c['brand']} · {c['type']} · {c['year']}</div><h1>{c['name']}</h1><p class="desc">{c['description']}</p><div class="price">от {c['price']}</div><div class="price-note">Итоговая стоимость зависит от комплектации и наличия.</div><div class="quick"><div><span>Двигатель</span><b>{c['engine']}</b></div><div><span>Мощность</span><b>{c['power']}</b></div><div><span>Привод</span><b>{c['drive']}</b></div><div><span>Разгон</span><b>{c['accel']}</b></div></div><div class="colors-title">Выберите цвет кузова</div><div class="swatches">{colors}</div><div class="chosen-color">Выбран: <b id="colorName">{c['colors'][0][0]}</b></div><a class="cta" id="offerLink" href="mailto:Primer4424@mail.ru?subject={quote('Заявка на ' + c['name'])}">Получить предложение →</a></div></section><section class="section"><div class="eyebrow">Четыре ракурса одной модели</div><h2>Галерея автомобиля</h2><div class="gallery-grid">{gallery}</div></section><section class="section"><div class="eyebrow">Основные данные</div><h2>Характеристики</h2><div class="spec-grid"><div><span>Марка</span><b>{c['brand']}</b></div><div><span>Модель</span><b>{c['name']}</b></div><div><span>Класс кузова</span><b>{c['type']}</b></div><div><span>Год</span><b>{c['year']}</b></div><div><span>Двигатель</span><b>{c['engine']}</b></div><div><span>Мощность</span><b>{c['power']}</b></div><div><span>Привод</span><b>{c['drive']}</b></div><div><span>Коробка</span><b>{c['gearbox']}</b></div><div><span>0–100 км/ч</span><b>{c['accel']}</b></div><div><span>Макс. скорость</span><b>{c['speed']}</b></div><div><span>Статус</span><b>В наличии / под заказ</b></div><div><span>Локация</span><b>{c['location']}</b></div></div></section><section class="section"><div class="eyebrow">Комфорт и технологии</div><h2>Основное оснащение</h2><div class="equipment">{equip}</div></section><section class="section offer"><div class="offer-box"><div class="eyebrow">Заявка</div><h2>{c['name']}</h2><p>{c['description']}</p><a class="cta" href="mailto:Primer4424@mail.ru?subject={quote('Тест-драйв ' + c['name'])}">Записаться на тест-драйв →</a></div><div class="offer-box"><div class="eyebrow">Цена</div><h2>{c['price']}</h2><p>Цена указана для модели из карточки каталога. Название, марка, класс, год и описание на этой странице идентичны карточке.</p><p class="disclaimer">Фотографии относятся к указанному поколению и модели. Источники открываются по ссылкам под изображениями.</p></div></section></main><footer class="wrap">© 2026 DRIVE · <a href="mailto:Primer4424@mail.ru">Primer4424@mail.ru</a></footer><script>(()=>{{const main=document.getElementById('mainImage'),preview=document.getElementById('paintPreview'),colorName=document.getElementById('colorName'),offer=document.getElementById('offerLink');document.querySelectorAll('.thumb').forEach(b=>b.addEventListener('click',()=>{{document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));b.classList.add('active');main.src=b.dataset.src}}));document.querySelectorAll('.swatch').forEach(b=>b.addEventListener('click',()=>{{document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));b.classList.add('active');preview.style.setProperty('--paint',b.dataset.hex);colorName.textContent=b.dataset.color;offer.href='mailto:Primer4424@mail.ru?subject='+encodeURIComponent('Заявка на {c['name']}')+'&body='+encodeURIComponent('Автомобиль: {c['name']}\nЦвет: '+b.dataset.color+'\nЦена: от {c['price']}')}}));}})();</script></body></html>'''

          for car in cars:
              Path(car['path']).parent.mkdir(parents=True, exist_ok=True)
              Path(car['path']).write_text(detail_html(car), encoding='utf-8')

          # Keep catalogue cards synchronized with the same data used by detail pages.
          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          marker_start = '<!-- catalog-consistency-v2:start -->'
          marker_end = '<!-- catalog-consistency-v2:end -->'
          index = re.sub(re.escape(marker_start) + r'.*?' + re.escape(marker_end), '', index, flags=re.S)
          payload = []
          for c in cars:
              payload.append({
                  'slug': c['slug'], 'path': c['path'], 'name': c['name'], 'brand': c['brand'],
                  'type': c['type'], 'year': c['year'], 'price': c['price'],
                  'description': c['description'], 'image': img(c['gallery'][0][0])
              })
          sync_script = f'''{marker_start}<script>(()=>{{const cars={json.dumps(payload, ensure_ascii=False)};function sync(){{cars.forEach(c=>{{let link=document.querySelector('a[href="'+c.path+'"],a[href="./'+c.path+'"],a[href$="/'+c.slug+'.html"]');let card=link?link.closest('.car,article'):null;if(!card){{card=[...document.querySelectorAll('.car,article')].find(x=>{{const h=x.querySelector('h3');return h&&h.textContent.trim()===c.name}})}}if(!card)return;const imgEl=card.querySelector('img');if(imgEl){{imgEl.src=c.image;imgEl.alt=c.name}}const h=card.querySelector('h3');if(h)h.textContent=c.name;const small=card.querySelector('small');if(small)small.textContent=c.year+' · '+c.type;const spec=card.querySelector('.spec');if(spec)spec.textContent=c.description;const price=card.querySelector('.price strong');if(price)price.textContent=c.price;card.dataset.brand=c.brand;card.dataset.type=c.type;card.dataset.model=c.name;card.dataset.name=c.name;if(link)link.setAttribute('aria-label','Открыть '+c.name)}})}}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',sync):sync();}})();</script>{marker_end}'''
          index = index.replace('</body>', sync_script + '</body>', 1)
          index_path.write_text(index, encoding='utf-8')

          # Validate every detail page and the catalogue synchronization payload.
          for car in cars:
              text = Path(car['path']).read_text(encoding='utf-8')
              assert text.count('class="thumb ') == 4
              assert text.count('class="gallery-card"') == 4
              assert f'<h1>{car["name"]}</h1>' in text
              assert f'<p class="desc">{car["description"]}</p>' in text
              assert f'<b>{car["type"]}</b>' in text
          assert marker_start in index and marker_end in index
          PY
      - name: Commit gallery update
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html cars/*.html
          git commit -m "Add four matching photos to every car detail page"
          git push
